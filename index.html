<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Tic Tac Toe</h1>
    <div class="status">
      C'est au tour de <span id="currentPlayer">X</span>.
    </div>
    <table>
      <tr>
        <td onclick="makeMove(this)"></td>
        <td onclick="makeMove(this)"></td>
        <td onclick="makeMove(this)"></td>
      </tr>
      <tr>
        <td onclick="makeMove(this)"></td>
        <td onclick="makeMove(this)"></td>
        <td onclick="makeMove(this)"></td>
      </tr>
      <tr>
        <td onclick="makeMove(this)"></td>
        <td onclick="makeMove(this)"></td>
        <td onclick="makeMove(this)"></td>
      </tr>
    </table>
    <button onclick="resetGame()">Réinitialiser</button>
    <script>
      let currentPlayer = "X";
      let gameActive = true;
      const statusDisplay = document.querySelector(".status");
      const cells = document.querySelectorAll("td");

      async function saveResults(winner) {
        const response = await fetch("/save.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ winner }),
        });
        return response.ok;
      }

      function makeMove(cell) {
        if (!gameActive || cell.textContent !== "") return;
        cell.textContent = currentPlayer;
        cell.classList.add("taken");
        if (checkWin()) {
          statusDisplay.textContent = `Le joueur ${currentPlayer} a gagné !`;
          gameActive = false;
          saveResults(currentPlayer);
          return;
        }
        if (Array.from(cells).every((cell) => cell.textContent !== "")) {
          statusDisplay.textContent = "C'est un match nul !";
          saveResults("Draw");
          gameActive = false;
          return;
        }
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        statusDisplay.innerHTML = `C'est au tour de <span id="currentPlayer">${currentPlayer}</span>.`;
      }

      function checkWin() {
        const winningCombinations = [
          [0, 1, 2],
          [3, 4, 5],
          [6, 7, 8],
          [0, 3, 6],
          [1, 4, 7],
          [2, 5, 8],
          [0, 4, 8],
          [2, 4, 6],
        ];
        return winningCombinations.some((combination) => {
          return combination.every((index) => {
            return cells[index].textContent === currentPlayer;
          });
        });
      }

      function resetGame() {
        currentPlayer = "X";
        gameActive = true;
        statusDisplay.innerHTML = `C'est au tour de <span id="currentPlayer">${currentPlayer}</span>.`;
        cells.forEach((cell) => {
          cell.textContent = "";
          cell.classList.remove("taken");
        });
      }
    </script>
  </body>
</html>
